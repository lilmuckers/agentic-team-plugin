services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_ledger
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp_ledger:
    build: ./mcp_ledger
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mcp:mcp@postgres:5432/mcp_ledger
      HOST: 0.0.0.0
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  pgdata:
