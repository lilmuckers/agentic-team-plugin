name: implement-feature
description: Route a feature request through analysis, implementation, and QA.
steps:
  - id: specify
    agent: spec
    output: feature brief and acceptance criteria
  - id: plan
    agent: orchestrator
    output: execution plan
  - id: build
    agent: builder
    output: implementation change set
  - id: qa
    agent: qa
    output: assessment and recommendation
completion:
  requires:
    - execution plan
    - implementation summary
    - qa recommendation
