name: implement-feature
description: Route a feature request through specification, orchestration, implementation, and QA with explicit callback and review loops.
steps:
  - id: specify
    agent: spec
    preconditions:
      - Request or issue exists and feature intent has been surfaced.
      - Human-facing scope questions are clarified enough to begin specification.
    postconditions:
      - Issue has acceptance criteria, test strategy, assumptions, and linked context.
      - Issue is either marked ready-for-build or explicitly returned for clarification.
    output: feature issue and specification update
  - id: orchestrate
    agent: orchestrator
    preconditions:
      - Spec output exists.
      - scripts/validate-issue-ready.py passes before Builder handoff.
    postconditions:
      - Task ledger entry is updated.
      - Builder receives a delegated packet with callback expectations.
    output: builder handoff packet
  - id: build
    agent: builder
    preconditions:
      - Issue is ready-for-build.
      - Required docs and assumptions are linked.
    postconditions:
      - Branch, commits, and PR exist.
      - Callback report is returned with tests and next action.
    output: implementation PR and callback report
  - id: qa
    agent: qa
    preconditions:
      - PR exists and links back to the issue.
      - Validation evidence is available.
    postconditions:
      - QA outcome is explicit.
      - qa-approved label is applied or required changes are recorded.
    output: QA review outcome
on_blocked:
  - Route missing product meaning or unclear acceptance criteria back to Spec through Orchestrator.
  - Keep the task ledger current with blocked state and next action.
on_failure:
  - Surface failure to Orchestrator immediately.
  - Record failure reason in the callback report and visible project artifact when relevant.
loops:
  - from: qa
    to: build
    trigger: QA requests changes or identifies blocking defects.
  - from: build
    to: specify
    trigger: Implementation reveals project-level ambiguity or missing requirements.
  - from: specify
    to: orchestrate
    trigger: Clarification is complete and the issue is ready for build again.
